<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TG Parser{% endblock %}</title>
  <link rel="icon" href="/static/favicon.ico">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <a href="/" class="logo">TG Parser</a>
    <nav>
      <a href="/">{{ t('nav_channels') }}</a>
      <a href="/search">{{ t('nav_search') }}</a>
    </nav>
    <div class="lang-switcher">
      {% for code, name in languages.items() %}
        {% if code == lang %}
          <span class="lang-active">{{ code|upper }}</span>
        {% else %}
          <a href="/set-lang/{{ code }}">{{ code|upper }}</a>
        {% endif %}
      {% endfor %}
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
